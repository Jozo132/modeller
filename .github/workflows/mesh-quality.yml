name: tessellation-policy

on:
  push:
    paths:
      - 'js/cad/Tessellation.js'
      - 'js/cad/TessellationConfig.js'
      - 'js/cad/MeshValidator.js'
      - 'js/cad/WasmTessellation.js'
      - 'js/cad/diagnostics.js'
      - 'tests/test-wasm-tessellation-policy.js'
      - 'tests/step/**'
  pull_request:
    paths:
      - 'js/cad/Tessellation.js'
      - 'js/cad/TessellationConfig.js'
      - 'js/cad/MeshValidator.js'
      - 'js/cad/WasmTessellation.js'
      - 'js/cad/diagnostics.js'
      - 'tests/test-wasm-tessellation-policy.js'
      - 'tests/step/**'

permissions:
  contents: read

jobs:
  tessellation-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx asc assembly/index.ts --target debug && npx asc assembly/index.ts --target release
      - name: WASM tessellation policy tests
        run: node tests/test-wasm-tessellation-policy.js
      - name: STEP import regression
        run: node tests/test-step-import.js
      - name: WASM tessellation regression
        run: node tests/test-wasm-tessellation.js
      - name: Upload mesh diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mesh-quality-diagnostics
          path: /tmp/mesh-quality-diagnostics/
          if-no-files-found: ignore
